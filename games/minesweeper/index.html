<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>扫雷 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css?v=3">
  <style>
    .mine-board {
      display: inline-grid;
      gap: 2px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      box-shadow: var(--shadow);
    }
    .mine-cell {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 0;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      color: transparent;
      transition: background 0.1s;
      user-select: none;
      -webkit-user-select: none;
    
      border: 2px solid;
      border-color: #fff #888 #888 #fff;
    }
    .mine-cell:hover:not(.revealed):not(.flagged) {
      background: #4a4a6a;
    }
    .mine-cell.revealed {
      background: #1f1f3a;
      cursor: default;
    
      border: 1px solid #ccc;
      background: #e0e0e0;
    }
    .mine-cell.revealed[data-num="1"] { color: #74b9ff; }
    .mine-cell.revealed[data-num="2"] { color: #55efc4; }
    .mine-cell.revealed[data-num="3"] { color: #fd79a8; }
    .mine-cell.revealed[data-num="4"] { color: #a29bfe; }
    .mine-cell.revealed[data-num="5"] { color: #e17055; }
    .mine-cell.revealed[data-num="6"] { color: #00cec9; }
    .mine-cell.revealed[data-num="7"] { color: #fdcb6e; }
    .mine-cell.revealed[data-num="8"] { color: #ff7675; }
    .mine-cell.flagged {
      background: #4a3d6a;
      color: #fdcb6e;
      font-size: 1.1rem;
    }
    .mine-cell.mine-exploded {
      background: #d63031;
      color: #fff;
      font-size: 1.1rem;
    }
    .mine-cell.mine-shown {
      background: #2d1f3a;
      color: #e0e0e0;
      font-size: 1.1rem;
    }
    .diff-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .diff-buttons .btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .status-emoji {
      font-size: 2rem;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .flag-toggle {
      display: none;
      margin: 10px auto;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 900;
      border: 3px solid #111;
      background: #fff;
      box-shadow: 3px 3px 0 #111;
      cursor: pointer;
      font-family: inherit;
    }
    .flag-toggle.active {
      background: #ffed66;
      box-shadow: 0 0 0 #111;
      transform: translate(3px, 3px);
    }
    @media (max-width: 480px) {
      .mine-cell { width: 22px; height: 22px; font-size: 0.6rem; }
      .flag-toggle { display: block; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      .mine-cell { width: 28px; height: 28px; font-size: 0.75rem; }
      .flag-toggle { display: block; }
    }
  </style>
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>扫雷</h1>
  </div>

  <div class="diff-buttons">
    <button class="btn active" data-rows="9" data-cols="9" data-mines="10">初级 9×9</button>
    <button class="btn" data-rows="16" data-cols="16" data-mines="40">中级 16×16</button>
  </div>

  <div class="status-emoji" id="statusEmoji" title="点击重新开始"></div>

  <div class="game-info">
    <span><span class="label">M</span><strong id="minesLeft">10</strong></span>
    <span><span class="label">⏱️</span><strong id="timer">0</strong>s</span>
  </div>

  <div class="mine-board" id="board"></div>

  <button class="flag-toggle" id="flagToggle">🚩 插旗模式：关</button>

  <p style="color: var(--text-muted); margin-top: 16px; font-size: 0.9rem; text-align: center;">
    左键揭开格子 · 右键/长按标记旗帜 · 手机点击下方切换插旗模式
  </p>

  <script>
    let ROWS, COLS, MINES;
    let board, revealed, flagged, mineMap;
    let gameOver, firstClick, timerInterval, seconds;
    let flagCount;

    const boardEl = document.getElementById('board');
    const minesLeftEl = document.getElementById('minesLeft');
    const timerEl = document.getElementById('timer');
    const statusEmoji = document.getElementById('statusEmoji');
    const flagToggle = document.getElementById('flagToggle');
    let flagMode = false;

    flagToggle.addEventListener('click', () => {
      flagMode = !flagMode;
      flagToggle.textContent = flagMode ? '🚩 插旗模式：开' : '🚩 插旗模式：关';
      flagToggle.className = flagMode ? 'flag-toggle active' : 'flag-toggle';
    });

    function getCellSize() {
      return window.innerWidth <= 480 ? 22 : (window.innerWidth <= 768 ? 28 : 36);
    }

    function init(rows = 9, cols = 9, mines = 10) {
      ROWS = rows; COLS = cols; MINES = mines;
      board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
      revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      mineMap = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      gameOver = false;
      firstClick = true;
      flagCount = 0;
      clearInterval(timerInterval);
      seconds = 0;
      timerEl.textContent = '0';
      minesLeftEl.textContent = MINES;
      statusEmoji.textContent = '';

      const cellSize = getCellSize();
      boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
      boardEl.innerHTML = '';

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'mine-cell';
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          cell.dataset.r = r;
          cell.dataset.c = c;

          cell.addEventListener('click', () => {
            if (flagMode) { handleFlag(r, c); }
            else { handleClick(r, c); }
          });
          cell.addEventListener('contextmenu', e => { e.preventDefault(); handleFlag(r, c); });

          // 长按标旗（移动端）
          let longPressTimer;
          cell.addEventListener('touchstart', e => {
            longPressTimer = setTimeout(() => { handleFlag(r, c); e.preventDefault(); }, 500);
          });
          cell.addEventListener('touchend', () => clearTimeout(longPressTimer));
          cell.addEventListener('touchmove', () => clearTimeout(longPressTimer));

          boardEl.appendChild(cell);
        }
      }
    }

    function placeMines(safeR, safeC) {
      let placed = 0;
      while (placed < MINES) {
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (mineMap[r][c]) continue;
        if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
        mineMap[r][c] = true;
        placed++;
      }
      // 计算数字
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (mineMap[r][c]) { board[r][c] = -1; continue; }
          let count = 0;
          for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && mineMap[nr][nc]) count++;
            }
          board[r][c] = count;
        }
      }
    }

    function getCell(r, c) {
      return boardEl.children[r * COLS + c];
    }

    function handleClick(r, c) {
      if (gameOver || flagged[r][c] || revealed[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        timerInterval = setInterval(() => { seconds++; timerEl.textContent = seconds; }, 1000);
      }

      if (mineMap[r][c]) {
        // 踩到雷
        gameOver = true;
        clearInterval(timerInterval);
        statusEmoji.textContent = '';
        getCell(r, c).classList.add('mine-exploded');
        getCell(r, c).textContent = 'X';
        // 显示所有雷
        for (let i = 0; i < ROWS; i++)
          for (let j = 0; j < COLS; j++) {
            if (mineMap[i][j] && !(i === r && j === c)) {
              getCell(i, j).classList.add('mine-shown');
              getCell(i, j).textContent = 'M';
            }
          }
        return;
      }

      reveal(r, c);
      checkWin();
    }

    function reveal(r, c) {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
      if (revealed[r][c] || flagged[r][c] || mineMap[r][c]) return;

      revealed[r][c] = true;
      const cell = getCell(r, c);
      cell.classList.add('revealed');

      if (board[r][c] > 0) {
        cell.textContent = board[r][c];
        cell.dataset.num = board[r][c];
      } else {
        // 空格，递归展开
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            reveal(r + dr, c + dc);
      }
    }

    function handleFlag(r, c) {
      if (gameOver || revealed[r][c]) return;
      const cell = getCell(r, c);
      if (flagged[r][c]) {
        flagged[r][c] = false;
        flagCount--;
        cell.classList.remove('flagged');
        cell.textContent = '';
      } else {
        flagged[r][c] = true;
        flagCount++;
        cell.classList.add('flagged');
        cell.textContent = '¶';
      }
      minesLeftEl.textContent = MINES - flagCount;
    }

    function checkWin() {
      let unrevealed = 0;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!revealed[r][c]) unrevealed++;

      if (unrevealed === MINES) {
        gameOver = true;
        clearInterval(timerInterval);
        statusEmoji.textContent = '';
        // 自动标记所有雷
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (mineMap[r][c] && !flagged[r][c]) {
              flagged[r][c] = true;
              const cell = getCell(r, c);
              cell.classList.add('flagged');
              cell.textContent = '¶';
            }
        minesLeftEl.textContent = '0';
        setTimeout(() => alert(`GG, 你赢了！耗时 ${seconds} 秒`), 200);
      }
    }

    // 难度切换
    document.querySelectorAll('.diff-buttons .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-buttons .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        init(+btn.dataset.rows, +btn.dataset.cols, +btn.dataset.mines);
      });
    });

    statusEmoji.addEventListener('click', () => init(ROWS, COLS, MINES));

    init();
  </script>

  <script src="../../js/mobile.js?v=3"></script>
</body>
</html>
