<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>井字棋 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .ttt-cell svg { width: 60px; height: 60px; }
    .ttt-cell.x svg { stroke: var(--primary); }
    .ttt-cell.o svg { stroke: var(--text); }
    .ttt-board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
      margin: 20px auto;
    }
    .ttt-cell {
      background: var(--bg-card);
      border: 3px solid var(--border);
      border-radius: 0; box-shadow: 4px 4px 0px var(--border);
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      /* color: transparent; removed to show svg */
    }
    .ttt-cell:hover:not(.taken) {
      border-color: var(--primary);
      background: rgba(108,92,231,0.08);
    }
    .ttt-cell.x { color: #6c5ce7; }
    .ttt-cell.o { color: #00cec9; }
    .ttt-cell.win { background: rgba(108,92,231,0.15); border-color: var(--primary-light); }
    .ttt-cell.taken { cursor: default; }
    .status-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 16px 0;
      text-align: center;
      min-height: 40px;
    }
    .score-board {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }
    .score-board .score-item {
      padding: 10px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
    }
    .score-board .score-item .name {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .score-board .score-item .num {
      font-size: 1.8rem;
      font-weight: 800;
    }
    .score-board .score-item.player .num { color: #6c5ce7; }
    .score-board .score-item.ai .num { color: #00cec9; }
    .score-board .score-item.draw .num { color: var(--text-muted); }
    .diff-select {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .diff-select .btn.active {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }
    @media (max-width: 480px) {
      .ttt-board { grid-template-columns: repeat(3, 95px); grid-template-rows: repeat(3, 95px); }
      .ttt-cell { font-size: 2.2rem; }
    }
  </style>
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>井字棋</h1>
  </div>

  <div class="diff-select">
    <button class="btn" data-diff="easy">简单AI</button>
    <button class="btn active" data-diff="medium">中等AI</button>
    <button class="btn" data-diff="hard">困难AI</button>
  </div>

  <div class="score-board">
    <div class="score-item player">
      <div class="name">你 (X)</div>
      <div class="num" id="playerScore">0</div>
    </div>
    <div class="score-item draw">
      <div class="name">平局</div>
      <div class="num" id="drawScore">0</div>
    </div>
    <div class="score-item ai">
      <div class="name">AI (O)</div>
      <div class="num" id="aiScore">0</div>
    </div>
  </div>

  <div class="status-text" id="status">你先走 (X)</div>

  <div class="ttt-board" id="board"></div>

  <div class="game-controls">
    <button class="btn btn-primary" id="resetBtn">重新开始</button>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const playerScoreEl = document.getElementById('playerScore');
    const drawScoreEl = document.getElementById('drawScore');
    const aiScoreEl = document.getElementById('aiScore');

    let board, gameActive, aiDifficulty;
    let scores = { player: 0, ai: 0, draw: 0 };

    const LINES = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    aiDifficulty = 'medium';

    function init() {
      board = Array(9).fill('');
      gameActive = true;
      statusEl.textContent = '你先走 (X)';
      boardEl.innerHTML = '';

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'ttt-cell';
        cell.dataset.index = i;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      }
    }

    function handleClick(i) {
      if (!gameActive || board[i]) return;

      makeMove(i, 'X');

      if (checkResult()) return;

      // AI turn
      gameActive = false;
      statusEl.textContent = 'AI 思考中...';
      setTimeout(() => {
        const aiMove = getAIMove();
        if (aiMove !== -1) {
          makeMove(aiMove, 'O');
          checkResult();
        }
      }, 300 + Math.random() * 300);
    }

    function makeMove(i, symbol) {
      board[i] = symbol;
      const cell = boardEl.children[i];
      cell.innerHTML = symbol === 'X' ? '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"><line x1="4" y1="4" x2="20" y2="20"></line><line x1="20" y1="4" x2="4" y2="20"></line></svg>' : '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"><circle cx="12" cy="12" r="8"></circle></svg>';
      cell.classList.add(symbol.toLowerCase(), 'taken');
    }

    function checkResult() {
      // 检查胜利
      for (const [a,b,c] of LINES) {
        if (board[a] && board[a] === board[b] && board[b] === board[c]) {
          boardEl.children[a].classList.add('win');
          boardEl.children[b].classList.add('win');
          boardEl.children[c].classList.add('win');

          if (board[a] === 'X') {
            scores.player++;
            playerScoreEl.textContent = scores.player;
            statusEl.textContent = '你赢了！';
          } else {
            scores.ai++;
            aiScoreEl.textContent = scores.ai;
            statusEl.textContent = ' AI赢了！';
          }
          gameActive = false;
          return true;
        }
      }

      if (board.every(c => c)) {
        scores.draw++;
        drawScoreEl.textContent = scores.draw;
        statusEl.textContent = ' 平局！';
        gameActive = false;
        return true;
      }

      gameActive = true;
      statusEl.textContent = '轮到你了 (X)';
      return false;
    }

    function getAIMove() {
      const empty = board.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
      if (empty.length === 0) return -1;

      if (aiDifficulty === 'easy') {
        // 随机选
        return empty[Math.floor(Math.random() * empty.length)];
      }

      if (aiDifficulty === 'medium') {
        // 50%几率用最佳，50%随机
        if (Math.random() < 0.5) return empty[Math.floor(Math.random() * empty.length)];
        return bestMove();
      }

      // hard: minimax
      return bestMove();
    }

    function bestMove() {
      // 先检测能不能赢
      for (const [a,b,c] of LINES) {
        if (board[a]==='O' && board[b]==='O' && board[c]==='') return c;
        if (board[a]==='O' && board[c]==='O' && board[b]==='') return b;
        if (board[b]==='O' && board[c]==='O' && board[a]==='') return a;
      }
      // 阻止对方赢
      for (const [a,b,c] of LINES) {
        if (board[a]==='X' && board[b]==='X' && board[c]==='') return c;
        if (board[a]==='X' && board[c]==='X' && board[b]==='') return b;
        if (board[b]==='X' && board[c]==='X' && board[a]==='') return a;
      }
      // 中心
      if (board[4] === '') return 4;
      // 角
      const corners = [0,2,6,8].filter(i => board[i] === '');
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // 边
      const edges = [1,3,5,7].filter(i => board[i] === '');
      return edges.length ? edges[Math.floor(Math.random() * edges.length)] : -1;
    }

    // 难度切换
    document.querySelectorAll('.diff-select .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-select .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        aiDifficulty = btn.dataset.diff;
        init();
      });
    });

    document.getElementById('resetBtn').addEventListener('click', init);

    init();
  </script>

</body>
</html>
