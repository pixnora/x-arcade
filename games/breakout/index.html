<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>弹球打砖块 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>弹球打砖块</h1>
  </div>

  <div class="game-info">
    <span><span class="label">分数:</span><strong id="score">0</strong></span>
    <span><span class="label">生命:</span><strong id="lives">3</strong></span>
    <span><span class="label">关卡:</span><strong id="level">1</strong></span>
  </div>

  <div class="game-canvas-wrapper">
    <canvas id="gameCanvas" width="480" height="500"></canvas>
  </div>

  <div class="game-controls">
    <button class="btn btn-primary" id="startBtn">开始游戏</button>
  </div>

  <p style="color: var(--text-muted); margin-top: 16px; font-size: 0.9rem;">
    鼠标/触摸移动挡板，也可以使用 ←→ 方向键
  </p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const startBtn = document.getElementById('startBtn');

    const COLORS = ['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#e17055','#74b9ff','#55efc4','#a29bfe'];

    let paddleW = 80, paddleH = 14, paddleX;
    let ballR = 7, ballX, ballY, ballDX, ballDY;
    let bricks = [];
    let score = 0, lives = 3, level = 1;
    let animFrame, isRunning = false;
    let leftPressed = false, rightPressed = false;

    const BRICK_ROWS = 5;
    const BRICK_COLS = 8;
    const BRICK_W = 52;
    const BRICK_H = 18;
    const BRICK_PAD = 5;
    const BRICK_TOP = 40;
    const BRICK_LEFT = (canvas.width - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

    function createBricks() {
      bricks = [];
      for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
          bricks.push({
            x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
            y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
            w: BRICK_W,
            h: BRICK_H,
            color: COLORS[r % COLORS.length],
            alive: true,
            hits: r < 2 && level > 1 ? 2 : 1 // 高级关卡前两排需要打两次
          });
        }
      }
    }

    function resetBall() {
      paddleX = (canvas.width - paddleW) / 2;
      ballX = canvas.width / 2;
      ballY = canvas.height - 40;
      const speed = 3.5 + level * 0.3;
      const angle = -Math.PI/4 + Math.random() * Math.PI/2 - Math.PI/2;
      ballDX = speed * Math.cos(angle);
      ballDY = -Math.abs(speed * Math.sin(angle));
      if (Math.abs(ballDY) < 2) ballDY = -2;
    }

    function init() {
      score = 0;
      lives = 3;
      level = 1;
      scoreEl.textContent = 0;
      livesEl.textContent = 3;
      levelEl.textContent = 1;
      paddleW = 80;
      createBricks();
      resetBall();
      if (animFrame) cancelAnimationFrame(animFrame);
      isRunning = true;
      startBtn.textContent = '重新开始';
      loop();
    }

    function draw() {
      // 背景
      ctx.fillStyle = 'var(--primary)'; ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 砖块
      bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.rect(b.x, b.y, b.w, b.h);
        ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
        if (b.hits > 1) {
          /* original second hit stroke*/ ctx.strokeStyle='#888';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });

      // 挡板
       
       
       
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.rect(paddleX, canvas.height - 25, paddleW, paddleH);
      ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();

      // 球
      ctx.fillStyle = 'var(--primary)'; ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
      ctx.beginPath();
      ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
      ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
      // 球拖影
      /* removed trail */
      ctx.beginPath();
      ctx.arc(ballX - ballDX * 1.5, ballY - ballDY * 1.5, ballR * 0.7, 0, Math.PI * 2);
      ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
    }

    function update() {
      // 挡板移动
      if (leftPressed) paddleX = Math.max(0, paddleX - 7);
      if (rightPressed) paddleX = Math.min(canvas.width - paddleW, paddleX + 7);

      ballX += ballDX;
      ballY += ballDY;

      // 墙壁反弹
      if (ballX - ballR <= 0 || ballX + ballR >= canvas.width) ballDX = -ballDX;
      if (ballY - ballR <= 0) ballDY = -ballDY;

      // 挡板碰撞
      if (ballY + ballR >= canvas.height - 25 && ballY + ballR <= canvas.height - 25 + paddleH &&
          ballX >= paddleX && ballX <= paddleX + paddleW) {
        const hit = (ballX - paddleX) / paddleW;
        const angle = (hit - 0.5) * Math.PI * 0.7;
        const speed = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
        ballDX = speed * Math.sin(angle);
        ballDY = -Math.abs(speed * Math.cos(angle));
        if (Math.abs(ballDY) < 1.5) ballDY = -1.5;
      }

      // 球掉落
      if (ballY + ballR > canvas.height + 10) {
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) {
          isRunning = false;
          drawGameOver();
          return;
        }
        resetBall();
      }

      // 砖块碰撞
      bricks.forEach(b => {
        if (!b.alive) return;
        if (ballX + ballR > b.x && ballX - ballR < b.x + b.w &&
            ballY + ballR > b.y && ballY - ballR < b.y + b.h) {
          b.hits--;
          if (b.hits <= 0) {
            b.alive = false;
            score += 10 * level;
            scoreEl.textContent = score;
          }

          // 判断碰撞方向
          const overlapLeft = ballX + ballR - b.x;
          const overlapRight = b.x + b.w - (ballX - ballR);
          const overlapTop = ballY + ballR - b.y;
          const overlapBottom = b.y + b.h - (ballY - ballR);
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapTop || minOverlap === overlapBottom) ballDY = -ballDY;
          else ballDX = -ballDX;
        }
      });

      // 过关
      if (bricks.every(b => !b.alive)) {
        level++;
        levelEl.textContent = level;
        paddleW = Math.max(50, paddleW - 5);
        createBricks();
        resetBall();
      }
    }

    function loop() {
      if (!isRunning) return;
      update();
      draw();
      animFrame = requestAnimationFrame(loop);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'var(--primary)'; ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#111';
      ctx.fillText('得分: ' + score + '  关卡: ' + level, canvas.width/2, canvas.height/2 + 20);
      ctx.fillStyle = '#555';
      ctx.font = '16px sans-serif';
      ctx.fillText('点击「重新开始」再来', canvas.width/2, canvas.height/2 + 55);
      startBtn.textContent = '重新开始';
    }

    // 键盘控制
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') { leftPressed = true; e.preventDefault(); }
      if (e.key === 'ArrowRight' || e.key === 'd') { rightPressed = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = false;
      if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = false;
    });

    // 鼠标控制
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      paddleX = Math.max(0, Math.min(canvas.width - paddleW, x - paddleW/2));
    });

    // 触摸控制
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      paddleX = Math.max(0, Math.min(canvas.width - paddleW, x - paddleW/2));
    });

    startBtn.addEventListener('click', init);

    // 初始画面
    ctx.fillStyle = 'var(--primary)'; ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#555';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击「开始游戏」', canvas.width/2, canvas.height/2);
  </script>

  <script src="../../js/mobile.js"></script>
</body>
</html>
