<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>贪吃蛇</h1>
  </div>

  <div class="game-info">
    <span><span class="label">分数:</span><strong id="score">0</strong></span>
    <span><span class="label">最高:</span><strong id="best">0</strong></span>
  </div>

  <div class="game-canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>

  <div class="game-controls">
    <button class="btn btn-primary" id="startBtn">开始游戏</button>
    <button class="btn" id="pauseBtn">暂停</button>
  </div>

  <p style="color: var(--text-muted); margin-top: 16px; font-size: 0.9rem;">
    使用方向键 ↑↓←→ 或 WASD 控制方向，手机可点击屏幕四个方向区域
  </p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;
    const COLORS = {
      bg: '#fff',
      grid: '#eee',
      snake: '#f0f0f0',
      snakeHead: '#fff',
      food: 'var(--primary)',
      foodGlow: 'rgba(0,206,201,0.3)'
    };

    let snake, direction, nextDirection, food, score, bestScore, gameLoop, isPaused, isRunning;

    bestScore = parseInt(localStorage.getItem('snake_best') || '0');
    bestEl.textContent = bestScore;

    function init() {
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      direction = {x: 1, y: 0};
      nextDirection = {x: 1, y: 0};
      score = 0;
      scoreEl.textContent = '0';
      isPaused = false;
      isRunning = true;
      spawnFood();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 120);
      startBtn.textContent = '重新开始';
      pauseBtn.textContent = '暂停';
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function update() {
      if (isPaused) return;
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // 碰墙或碰自己
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          bestEl.textContent = bestScore;
          localStorage.setItem('snake_best', bestScore);
        }
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // 背景
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 网格线
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * GRID);
        ctx.lineTo(canvas.width, i * GRID);
        ctx.stroke();
      }

      // 食物发光
      ctx.fillStyle = COLORS.foodGlow;
      ctx.beginPath();
      /* removed food glow */
      ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();

      // 食物
      ctx.fillStyle = COLORS.food;
      ctx.beginPath();
      ctx.rect(food.x * GRID + 2, food.y * GRID + 2, GRID-4, GRID-4); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
      ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();

      // 蛇身
      snake.forEach((seg, i) => {
        const radius = 0;
        const x = seg.x * GRID + 1;
        const y = seg.y * GRID + 1;
        const w = GRID - 2;
        const h = GRID - 2;

        ctx.fillStyle = i === 0 ? COLORS.snakeHead : COLORS.snake;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, radius);
        ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();

        if (i === 0) {
          // 蛇眼
          // ASCII 手绘风蛇眼
          ctx.fillStyle = '#111';
          ctx.fillRect(seg.x * GRID + 6, seg.y * GRID + 6, 2, 2);
          ctx.fillRect(seg.x * GRID + 12, seg.y * GRID + 6, 2, 2); ctx.lineWidth=2; ctx.strokeStyle='#111'; ctx.stroke();
        }
      });
    }

    function gameOver() {
      clearInterval(gameLoop);
      isRunning = false;

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#a29bfe';
      ctx.fillText('得分: ' + score, canvas.width/2, canvas.height/2 + 20);
      ctx.fillStyle = '#888';
      ctx.font = '16px sans-serif';
      ctx.fillText('点击「重新开始」再来一局', canvas.width/2, canvas.height/2 + 55);

      startBtn.textContent = '重新开始';
    }

    // 键盘控制
    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if ((key === 'arrowup' || key === 'w') && direction.y !== 1) nextDirection = {x:0, y:-1};
      if ((key === 'arrowdown' || key === 's') && direction.y !== -1) nextDirection = {x:0, y:1};
      if ((key === 'arrowleft' || key === 'a') && direction.x !== 1) nextDirection = {x:-1, y:0};
      if ((key === 'arrowright' || key === 'd') && direction.x !== -1) nextDirection = {x:1, y:0};
      if (['arrowup','arrowdown','arrowleft','arrowright'].includes(key)) e.preventDefault();
    });

    // 触摸控制
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      e.preventDefault();
    });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20 && direction.x !== -1) nextDirection = {x:1, y:0};
        if (dx < -20 && direction.x !== 1) nextDirection = {x:-1, y:0};
      } else {
        if (dy > 20 && direction.y !== -1) nextDirection = {x:0, y:1};
        if (dy < -20 && direction.y !== 1) nextDirection = {x:0, y:-1};
      }
      touchStart = null;
    });

    startBtn.addEventListener('click', init);
    pauseBtn.addEventListener('click', () => {
      if (!isRunning) return;
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '继续' : '暂停';
    });

    // 初始画面
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#888';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击「开始游戏」', canvas.width/2, canvas.height/2);
  </script>

</body>
</html>
