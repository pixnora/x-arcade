<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>四子连线 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>.c4-grid { display:grid; grid-template-columns:repeat(7,50px); gap:4px; padding:10px; background:#111;} .c4-cell { width:50px; height:50px; border-radius:50%; background:#fff; cursor:pointer;} .c4-cell.p1 { background:#ff6b6b;} .c4-cell.p2 { background:#feca57;}</style>
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>四子连线</h1>
  </div>

  <div class="game-info">
    <span id='turn' style='color:#ff6b6b'>红方回合</span>
  </div>

  <div class='game-canvas-wrapper c4-grid' id='grid'></div>

  <div class="game-controls">
    <button class="btn btn-primary" id="startBtn">开始 / 重新开始</button>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    let isRunning = false;
    
            const gridEl = document.getElementById('grid'), turnEl = document.getElementById('turn');
            let board = Array(6).fill().map(()=>Array(7).fill(0)), player = 1;
            for(let r=0;r<6;r++) {
                for(let c=0;c<7;c++) {
                    let d = document.createElement('div'); d.className='c4-cell';
                    d.onclick = () => drop(c);
                    gridEl.appendChild(d);
                }
            }
            function render() {
                for(let r=0;r<6;r++) for(let c=0;c<7;c++) {
                    let k = gridEl.children[r*7+c];
                    k.className = 'c4-cell' + (board[r][c]===1?' p1':(board[r][c]===2?' p2':''));
                }
                turnEl.innerText = player===1 ? '红方回合' : '黄方回合';
                turnEl.style.color = player===1 ? '#ff6b6b' : '#feca57';
            }
            function win(p) { isRunning=false; alert((p===1?'红':'黄') + '方获胜！'); }
            function check() {
                for(let r=0;r<6;r++) for(let c=0;c<7;c++) {
                    let p=board[r][c]; if(!p) continue;
                    if(c<4 && p===board[r][c+1] && p===board[r][c+2] && p===board[r][c+3]) return win(p);
                    if(r<3 && p===board[r+1][c] && p===board[r+2][c] && p===board[r+3][c]) return win(p);
                    if(r<3 && c<4 && p===board[r+1][c+1] && p===board[r+2][c+2] && p===board[r+3][c+3]) return win(p);
                    if(r>2 && c<4 && p===board[r-1][c+1] && p===board[r-2][c+2] && p===board[r-3][c+3]) return win(p);
                }
            }
            function drop(c) {
                if(!isRunning) return;
                for(let r=5; r>=0; r--) if(board[r][c]===0) { board[r][c]=player; player=player===1?2:1; render(); check(); return; }
            }
            startBtn.onclick = () => { board = Array(6).fill().map(()=>Array(7).fill(0)); player=1; isRunning=true; render(); };
        
  </script>
  <script src="../../js/mobile.js"></script>
</body>
</html>
