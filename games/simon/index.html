<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指令记忆 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>.pad-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:200px; margin:auto;} .pad { width:95px; height:95px; border:4px solid #111; cursor:pointer; opacity:0.3; } .pad.active { opacity:1; }</style>
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>指令记忆</h1>
  </div>

  <div class="game-info">
    <span>关卡: <strong id='lvl'>1</strong></span>
  </div>

  <div class='game-canvas-wrapper pad-grid'><div class='pad' style='background:#ff6b6b' id='p0'></div><div class='pad' style='background:#48dbfb' id='p1'></div><div class='pad' style='background:#1dd1a1' id='p2'></div><div class='pad' style='background:#feca57' id='p3'></div></div>

  <div class="game-controls">
    <button class="btn btn-primary" id="startBtn">开始 / 重新开始</button>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    let isRunning = false;
    
            let seq = [], step = 0, lvl = document.getElementById('lvl'), locked=true;
            const pads = [0,1,2,3].map(i=>document.getElementById('p'+i));
            async function playSeq() {
                locked = true; step = 0;
                for(let i of seq) {
                    await new Promise(r=>setTimeout(r, 400));
                    pads[i].classList.add('active');
                    await new Promise(r=>setTimeout(r, 400));
                    pads[i].classList.remove('active');
                }
                locked = false;
            }
            pads.forEach((p, i) => p.onclick = () => {
                if(locked||!isRunning) return;
                p.classList.add('active'); setTimeout(()=>p.classList.remove('active'),200);
                if(i !== seq[step]) { isRunning = false; alert('按错了! GAME OVER'); return; }
                step++;
                if(step === seq.length) { seq.push(Math.floor(Math.random()*4)); lvl.innerText = seq.length; setTimeout(playSeq, 1000); }
            });
            startBtn.onclick = () => { isRunning=true; seq=[Math.floor(Math.random()*4)]; lvl.innerText=1; playSeq(); };
        
  </script>
</body>
</html>
