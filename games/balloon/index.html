<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>气球大作战 | X-ARCADE</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .game-page { background: #E0F7FA; } /* 柔和一点的背景色适合儿童 */
    canvas { 
      background: #FFFFFF; 
      cursor: crosshair;
      touch-action: none; /* 彻底阻止移动端滑动缩放 */
    }
    .score-popup {
      position: absolute;
      color: #FF5E5B;
      font-weight: 900;
      font-size: 24px;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      text-shadow: 2px 2px 0px #111;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }
    .top-panel {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="game-page">

  <div class="game-header">
    <a href="../../index.html" class="back-btn">← 返回</a>
    <h1>气球大作战</h1>
  </div>

  <div class="top-panel">
    <div class="game-info" style="margin: 0;">
      <span>得分: <strong id="score">0</strong></span>
    </div>
    <div class="game-info" style="margin: 0;">
      <span>倒计时: <strong id="time">60</strong> s</span>
    </div>
  </div>

  <div class="game-canvas-wrapper" style="position: relative;" id="canvas-container">
    <canvas id="gameCanvas" width="360" height="500"></canvas>
  </div>

  <div class="game-controls">
    <button class="btn btn-primary" id="startBtn">开始游戏</button>
  </div>

  <p style="color: var(--text-muted); margin-top: 16px; font-size: 0.9rem; max-width: 400px; text-align: center;">
    <strong>儿童专属：</strong>点击/触摸屏幕戳破升起的彩色气球！小气球飞得快，得分更高哦！看看你在60秒内能戳破多少个。
  </p>

  <script src="../../js/mobile.js"></script>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const container = document.getElementById('canvas-container');

    // 粗野风格的高饱和度色彩 (儿童喜欢)
    const COLORS = ['#FF5E5B', '#FFED66', '#55EFC4', '#74B9FF', '#A29BFE', '#FF9FF3', '#FCA5A5'];
    
    let isRunning = false;
    let score = 0;
    let timeLeft = 60;
    let balloons = [];
    let particles = [];
    let lastTime = 0;
    let spawnTimer = 0;
    let gameLoopId;
    let countdownId;

    class Balloon {
      constructor() {
        this.r = Math.random() * 20 + 25; // 25 到 45 的半径
        this.x = Math.random() * (canvas.width - this.r * 2) + this.r;
        this.y = canvas.height + this.r * 2;
        // 小气球速度更快且分数更高
        this.baseSpeed = (55 - this.r) * 0.08 + Math.random() * 1.5 + 1; 
        this.speedY = this.baseSpeed;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.wobbleSpeed = Math.random() * 0.05 + 0.02;
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.wobbleWidth = Math.random() * 2 + 1;
        this.points = Math.floor((50 - this.r) / 5); // 越小分越高 (1~5分)
        this.isPopped = false;
      }

      update() {
        this.y -= this.speedY;
        this.wobblePhase += this.wobbleSpeed;
        this.x += Math.cos(this.wobblePhase) * this.wobbleWidth;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        ctx.fillStyle = this.color;
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 3;

        // 气球底部小结
        ctx.beginPath();
        ctx.moveTo(-this.r * 0.2, this.r * 0.9);
        ctx.lineTo(this.r * 0.2, this.r * 0.9);
        ctx.lineTo(0, this.r * 1.2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 气球挂线
        ctx.beginPath();
        ctx.moveTo(0, this.r * 1.2);
        ctx.quadraticCurveTo(this.r * 0.5, this.r * 1.8, -this.r * 0.2, this.r * 2.5);
        ctx.lineWidth = 2;
        ctx.stroke();

        // 气球主体 (椭圆/圆)
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.stroke();

        // 气球高光 (不规则画法)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        ctx.ellipse(-this.r * 0.4, -this.r * 0.4, this.r * 0.2, this.r * 0.4, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      checkHit(px, py) {
        if (this.isPopped) return false;
        // 计算点击点到圆心的距离
        const dist = Math.hypot(this.x - px, this.y - py);
        return dist <= this.r + 5; // 增加一点容错范围
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 8 + 4;
        this.life = 1;
        this.decay = Math.random() * 0.05 + 0.02;
        this.gravity = 0.2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.4;
      }

      update() {
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;
        this.life -= this.decay;
      }

      draw() {
        if (this.life <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        
        ctx.beginPath();
        // 画个小三角形当做气球碎片
        ctx.moveTo(0, -this.size);
        ctx.lineTo(this.size, this.size);
        ctx.lineTo(-this.size, this.size);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        ctx.restore();
      }
    }

    function createExplosion(x, y, color, points) {
      // 粒子爆炸
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
      
      // 飘字动画 (脱离canvas使用DOM实现，更容易带阴影和动画)
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.innerText = '+' + points;
      popup.style.left = (x - 10) + 'px';
      popup.style.top = (y - 20) + 'px';
      // 根据分数决定颜色
      if(points > 3) popup.style.color = '#FFED66';
      else if(points > 1) popup.style.color = '#74B9FF';
      else popup.style.color = '#FF5E5B';

      container.appendChild(popup);
      setTimeout(() => {
        if(popup.parentNode === container) container.removeChild(popup);
      }, 1000);
    }

    function init() {
      score = 0;
      timeLeft = 60;
      balloons = [];
      particles = [];
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      startBtn.textContent = '重新开始';
      isRunning = true;
      
      if (countdownId) clearInterval(countdownId);
      countdownId = setInterval(() => {
        if (!isRunning) return;
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) gameOver();
      }, 1000);

      lastTime = performance.now();
      if (gameLoopId) cancelAnimationFrame(gameLoopId);
      gameLoopId = requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      if (!isRunning) return;

      // 随着时间推移，生成速度加快
      const timeFactor = 1 - (timeLeft / 60); // 0 开始，接近 1 结束
      const spawnInterval = 800 - (timeFactor * 400); // 从 800ms 降到 400ms

      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        balloons.push(new Balloon());
        spawnTimer = 0;
      }

      // 更新气球
      for (let i = balloons.length - 1; i >= 0; i--) {
        const b = balloons[i];
        b.update();
        if (b.y + b.r * 3 < 0) {
          balloons.splice(i, 1); // 飞出屏幕则销毁
        }
      }

      // 更新粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function draw() {
      // 绘制背景 (清空画布)
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 画点云朵装饰背景 (儿童氛围)
      drawCloud(100, 150, 40);
      drawCloud(300, 100, 30);
      drawCloud(200, 350, 50);
      drawCloud(50, 400, 25);

      // 绘制气球
      balloons.forEach(b => b.draw());

      // 绘制粒子
      particles.forEach(p => p.draw());

      // 绘制游戏结束遮罩
      if (!isRunning && timeLeft <= 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('时间到！', canvas.width/2, canvas.height/2 - 20);
        
        ctx.font = '24px sans-serif';
        ctx.fillStyle = '#ffed66';
        ctx.fillText('戳破了气球总得分: ' + score, canvas.width/2, canvas.height/2 + 20);
      }
    }

    // 绘制云朵背景的辅助函数
    function drawCloud(cx, cy, size) {
      ctx.save();
      ctx.fillStyle = '#F4F4F0'; // 灰白色云朵
      ctx.beginPath();
      ctx.arc(cx, cy, size, 0, Math.PI * 2);
      ctx.arc(cx + size*0.8, cy - size*0.3, size*0.8, 0, Math.PI*2);
      ctx.arc(cx + size*1.5, cy, size*0.9, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function gameLoop(time) {
      const dt = time - lastTime;
      lastTime = time;
      
      update(dt);
      draw();
      
      gameLoopId = requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      isRunning = false;
      clearInterval(countdownId);
    }

    // 交互逻辑：只监听一次点击坐标
    function handleTap(e) {
      if (!isRunning) return;
      e.preventDefault();

      let x, y;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      // 支持鼠标或触摸
      if (e.type === 'touchstart') {
        x = (e.touches[0].clientX - rect.left) * scaleX;
        y = (e.touches[0].clientY - rect.left) * scaleY;
      } else {
        x = (e.offsetX !== undefined) ? e.offsetX : (e.clientX - rect.left) * scaleX;
        y = (e.offsetY !== undefined) ? e.offsetY : (e.clientY - rect.top) * scaleY;
      }

      // 倒序遍历更符合视觉（先点上面的）
      for (let i = balloons.length - 1; i >= 0; i--) {
        const b = balloons[i];
        if (b.checkHit(x, y)) {
          b.isPopped = true;
          score += b.points;
          scoreEl.textContent = score;
          createExplosion(b.x, b.y, b.color, b.points);
          balloons.splice(i, 1);
          break; // 一次只点破一个
        }
      }
    }

    // 绑定事件
    canvas.addEventListener('mousedown', handleTap);
    canvas.addEventListener('touchstart', handleTap, {passive: false});
    startBtn.addEventListener('click', init);

    // 初始画面渲染
    draw();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('准备好了吗？', canvas.width/2, canvas.height/2);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#ffed66';
    ctx.fillText('点击下方的【开始游戏】', canvas.width/2, canvas.height/2 + 40);

  </script>
</body>
</html>
